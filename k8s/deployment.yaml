apiVersion: apps/v1
kind: Deployment
metadata:
  name: tinaa-msp
  namespace: tinaa
  labels:
    app: tinaa-msp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tinaa-msp
  template:
    metadata:
      labels:
        app: tinaa-msp
    spec:
      containers:
        - name: tinaa
          image: 192.168.86.94:30500/tinaa-msp:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8765
              name: http
          envFrom:
            - configMapRef:
                name: tinaa-config
            - secretRef:
                name: tinaa-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8765
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8765
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until nc -z tinaa-postgres 5432; do
                echo "PostgreSQL not ready, sleeping..."
                sleep 2
              done
              echo "PostgreSQL is ready!"
        - name: run-migrations
          image: 192.168.86.94:30500/tinaa-msp:latest
          imagePullPolicy: Always
          command: ["python", "-m", "alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: tinaa-config
            - secretRef:
                name: tinaa-secret
---
apiVersion: v1
kind: Service
metadata:
  name: tinaa-msp
  namespace: tinaa
spec:
  selector:
    app: tinaa-msp
  ports:
    - port: 8765
      targetPort: 8765
      name: http
