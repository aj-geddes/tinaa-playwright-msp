name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check tinaa/ --output-format=github

      - name: Format check
        run: ruff format --check tinaa/

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ".[dev]"

      - name: Install Playwright
        run: playwright install chromium --with-deps

      - name: Run tests
        run: pytest tests/unit/ -q --timeout=60

  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [quality, test]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.quality.result }}" == "success" && \
                "${{ needs.test.result }}" == "success" ]]; then
            echo "All CI checks passed"
          else
            echo "CI failed — quality: ${{ needs.quality.result }}, test: ${{ needs.test.result }}"
            exit 1
          fi
