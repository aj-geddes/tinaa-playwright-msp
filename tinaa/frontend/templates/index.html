<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TINAA MSP — Quality Dashboard</title>
  <meta
    name="description"
    content="Testing Intelligence Network Automation Assistant — Managed Service Platform"
  />

  <!-- Tailwind CSS via CDN (no build step required) -->
  <script>
    // Pre-define config BEFORE Tailwind loads — Tailwind CDN reads this on init
    window.tailwind = {
      config: {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#3B82F6",
              "surface-dark": "#1E293B",
              success: "#22C55E",
              warning: "#F59E0B",
              danger: "#EF4444",
            },
          },
        },
      },
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body class="bg-slate-900 text-slate-50 min-h-screen">

  <!-- Skip-to-content link for keyboard/screen-reader users -->
  <a
    href="#main-content"
    class="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 focus:z-50
           focus:px-4 focus:py-2 focus:bg-blue-600 focus:text-white focus:rounded
           focus:ring-2 focus:ring-white focus:ring-offset-2 focus:ring-offset-slate-900"
  >
    Skip to content
  </a>

  <!-- Application shell: sidebar + header + main content -->
  <div class="flex h-screen overflow-hidden" id="app-shell">

    <!-- Sidebar navigation (rendered by nav.js component) -->
    <tinaa-nav id="sidebar-nav" aria-label="Main navigation"></tinaa-nav>

    <!-- Right-hand column: header + content -->
    <div class="flex flex-col flex-1 min-w-0 overflow-hidden">

      <!-- Top header bar (rendered by header.js component) -->
      <tinaa-header id="top-header"></tinaa-header>

      <!-- Primary content area -->
      <main
        id="main-content"
        role="main"
        tabindex="-1"
        class="flex-1 overflow-y-auto p-4 md:p-6 focus:outline-none"
        aria-live="polite"
        aria-atomic="false"
      >
        <!-- Pages are rendered here by the router in app.js -->
      </main>

    </div>
  </div>

  <!-- Global notification area for aria-live announcements -->
  <div
    id="aria-announcer"
    role="status"
    aria-live="polite"
    aria-atomic="true"
    class="sr-only"
  ></div>

  <!-- Noscript fallback — shown only when JavaScript is disabled -->
  <noscript>
    <div style="padding: 2rem; text-align: center; font-family: system-ui; color: #e2e8f0; background: #0f172a; min-height: 100vh;">
      <h1>TINAA MSP</h1>
      <p>JavaScript is required to use the TINAA dashboard.</p>
      <p>The API is still available at <a href="/api/docs" style="color: #60a5fa;">/api/docs</a></p>
    </div>
  </noscript>

  <!-- ES module entry point — loads the SPA router and all components -->
  <script type="module" src="/static/js/app.js"></script>
</body>
</html>
